{% extends 'blog/layout.html' %}
{% load static %}

{% block title %}Обновление профиля{% endblock %}

{% block static %}
<link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h1>Редактирование профиля</h1>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}

            <button type="submit">Обновить</button>
        </form>

    </div>

</div>

{% endblock %}
