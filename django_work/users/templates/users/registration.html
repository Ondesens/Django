{% extends 'blog/layout.html' %}
{% load static %}

{% block title %}Регистрация{% endblock %}

{% block static %}
<link rel="stylesheet" href="{% static 'users/css/auth.css' %}">
{% endblock %}

{% block content %}

<div class="auth-wrapper">

    <div class="auth-card">

        <h1>Регистрация</h1>
        <p>Создайте новый аккаунт</p>

        <form method="POST">
            {% csrf_token %}
            {{ regform.as_p }}

            <button type="submit">Зарегистрироваться</button>
        </form>

    </div>

</div>

{% endblock %}
